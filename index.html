<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Legend</title>
<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
header{background:#020617;padding:12px;text-align:center;font-size:26px;font-weight:bold}
.container{display:flex}
.sidebar{width:260px;background:#020617;height:100vh;overflow:auto;padding:10px;border-right:1px solid #111}
.sidebar button{width:100%;margin:6px 0;padding:12px;border:none;border-radius:12px;background:#111827;color:#fff;cursor:pointer;transition:.2s}
.sidebar button:hover{background:#1f2937}
.main{flex:1;padding:15px;text-align:center}
canvas{background:#000;border-radius:12px;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.topbar{display:flex;justify-content:space-between;margin-bottom:10px}
.score,.high,.profile{font-size:14px}
.profile{color:#facc15}
</style>
</head>
<body>
<header>👑 Arcade Legend</header>

<div class="container">
<div class="sidebar" id="menu"></div>

<div class="main">
<div class="topbar">
<div class="profile" id="profile"></div>
<div class="score" id="score">Score: 0</div>
<div class="high" id="high">High: 0</div>
</div>
<canvas id="c" width="420" height="420"></canvas>
</div>
</div>

<script>
const c=document.getElementById('c');
const x=c.getContext('2d');
const scoreEl=document.getElementById('score');
const highEl=document.getElementById('high');
const profileEl=document.getElementById('profile');

let loopId,score=0,currentGame="";

// PROFILE SYSTEM
let user=localStorage.getItem("user")||prompt("Enter username:");
localStorage.setItem("user",user);
profileEl.innerText="Player: "+user;

function clear(){x.clearRect(0,0,420,420)}
function stop(){cancelAnimationFrame(loopId)}
function run(name,f){stop();score=0;currentGame=name;updateScore();loadHigh();f()}
function updateScore(){scoreEl.innerText="Score: "+score}
function updateHigh(v){highEl.innerText="High: "+v}
function rand(n){return Math.floor(Math.random()*n)}

function saveHigh(){let key=user+"_"+currentGame;let h=localStorage.getItem(key)||0;if(score>h){localStorage.setItem(key,score);updateHigh(score)}}
function loadHigh(){let key=user+"_"+currentGame;updateHigh(localStorage.getItem(key)||0)}

// SOUND SYSTEM
let audioCtx=new AudioContext();
function beep(f=300){let o=audioCtx.createOscillator();o.frequency.value=f;o.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.1)}

// REAL FLAPPY (pipes)
function flappy(){let y=200,v=0,pipes=[[400,rand(250)]];
onkeydown=e=>{if(e.key===' ')v=-10};
(function L(){clear();v+=0.8;y+=v;
if(Math.random()<0.02)pipes.push([400,rand(250)]);
pipes.forEach(p=>{p[0]-=3;x.fillRect(p[0],0,30,p[1]);x.fillRect(p[0],p[1]+120,30,400)});
x.fillRect(100,y,20,20);
score++;updateScore();saveHigh();
loopId=requestAnimationFrame(L)})();}

// SPACE INVADERS STYLE
function invaders(){let e=[[50,50],[150,50],[250,50]],b=[];
c.onclick=()=>b.push([200,350]);
(function L(){clear();e.forEach(a=>a[1]+=0.2);
b.forEach(a=>a[1]-=5);
e.forEach(a=>x.fillRect(a[0],a[1],20,20));
b.forEach(a=>x.fillRect(a[0],a[1],5,10));
score++;updateScore();saveHigh();
loopId=requestAnimationFrame(L)})();}

// BETTER SNAKE
function snake(){let s=[[200,200]],d=[20,0],f=[100,100];
onkeydown=e=>{if(e.key==='ArrowUp')d=[0,-20];if(e.key==='ArrowDown')d=[0,20];if(e.key==='ArrowLeft')d=[-20,0];if(e.key==='ArrowRight')d=[20,0];};
(function L(){clear();s.unshift([s[0][0]+d[0],s[0][1]+d[1]]);
if(s[0][0]==f[0]&&s[0][1]==f[1]){f=[rand(20)*20,rand(20)*20];score++;beep(600);updateScore();saveHigh()}else s.pop();
x.fillStyle='red';x.fillRect(f[0],f[1],20,20);
x.fillStyle='lime';s.forEach(p=>x.fillRect(p[0],p[1],20,20));
loopId=requestAnimationFrame(()=>setTimeout(L,80));})();}

// DASH GAME
function dash(){let x0=0;
(function L(){clear();x0+=5;if(x0>400)x0=0;x.fillRect(x0,200,30,30);score++;updateScore();saveHigh();loopId=requestAnimationFrame(L)})();}

const games={
"Snake Deluxe":snake,
"Flappy Pro":flappy,
"Space Invaders":invaders,
"Dash":dash
};

const menu=document.getElementById('menu');
Object.keys(games).forEach(name=>{
  const b=document.createElement('button');
  b.innerText=name;
  b.onclick=()=>run(name,games[name]);
  menu.appendChild(b);
});

run("Snake Deluxe",snake);
</script>

</body>
</html>
